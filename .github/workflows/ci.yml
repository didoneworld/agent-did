name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run tests
        run: python -m pytest -v
        
      - name: Run linter
        run: pip install ruff && ruff check .
        
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        
      - name: Build Docker
        run: docker build -t agent-did .
        
      - name: Smoke test
        run: |
          docker run -d -p 8080:8000 --name test-agent agent-did
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          docker kill test-agent
